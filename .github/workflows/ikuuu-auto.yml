name: Ikuuu Auto Checkin

on:
  workflow_dispatch:
  schedule:
    - cron: '16 16 * * *'

permissions:
  contents: write

jobs:
  checkin_job:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 📥 拉代码
      - name: Checkout private repo (ikuuu-auto)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ikuuu-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # 🐍 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🌐 安装 Chrome（关键）
      - name: Install Chrome
        run: |
          sudo apt update
          sudo apt install -y google-chrome-stable

      # 📦 安装依赖
      - name: Install dependencies
        working-directory: scripts
        run: |
          pip install --upgrade pip
          pip install seleniumbase requests beautifulsoup4 cloudscraper

      # 🚀 运行
      - name: Run Ikuuu Checkin Script
        working-directory: scripts
        env:
          IKUUU_EMAIL: ${{ secrets.IKUUU_EMAIL }}
          IKUUU_PASSWORD: ${{ secrets.IKUUU_PASSWORD }}
        run: |
          python ikuuu.py
      # 上传截图，方便调试
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ikuuu-screenshots
          path: "*.png"