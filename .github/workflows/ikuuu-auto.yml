name: Ikuuu Auto Checkin

on:
  workflow_dispatch:

  
  schedule:
    - cron: '16 16 * * *'
    

permissions:
  contents: write

jobs:
  checkin_job:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ✅ 拉取私库 ikuuu-auto
      - name: Checkout private repo (ikuuu-auto)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ikuuu-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # 🐍 安装 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 📦 安装依赖
      - name: Install dependencies
        working-directory: scripts
        run: |
          pip install requests beautifulsoup4

      # 🚀 运行脚本
      - name: Run Ikuuu Checkin Script
        working-directory: scripts
        env:
          IKUUU_EMAIL: ${{ secrets.IKUUU_EMAIL }}
          IKUUU_PASSWORD: ${{ secrets.IKUUU_PASSWORD }}
        run: python ikuuu.py

      