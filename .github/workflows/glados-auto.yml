name: Glados Auto Checkin

on:
  workflow_dispatch:

  # 每天运行一次（UTC 16:10 = 北京时间 00:10）
  schedule:
    - cron: '10 16 * * *'

permissions:
  contents: read

jobs:
  checkin_job:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ✅ 拉取私库 glados-auto
      - name: Checkout private repo (glados-auto)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/glados-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # 🐍 安装 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 📦 安装依赖
      - name: Install dependencies
        working-directory: scripts
        run: |
          pip install requests

      # 🚀 运行脚本
      - name: Run Glados Checkin Script
        working-directory: scripts
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
        run: python glados.py
