name: Auto Renew host2 Server Script (Hysteria2 JSON Secret)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时运行一次

permissions:
  contents: read

jobs:
  run-renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # =========================
      # 📥 拉取私有仓库
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/host2play-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # 🐍 Python
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # =========================
      # 📦 系统依赖
      # =========================
      - name: Install System Dependencies
        working-directory: scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl wget jq

      # =========================
      # 📡 安装 Hysteria2 客户端
      # =========================
      - name: Install Hysteria2 client
        working-directory: scripts
        run: |
          curl -L -o hysteria https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria
          sudo mv hysteria /usr/local/bin/
          hysteria version

      # =========================
      # 📄 写入 Hysteria2 JSON 配置
      # =========================
      - name: Write Hysteria2 config from Secret
        working-directory: scripts
        env:
          HYSTERIA_JSON: ${{ secrets.HYSTERIA_JSON }}
        run: |
          echo "$HYSTERIA_JSON" > hysteria_config.json

      # =========================
      # 🚀 启动 Hysteria2 客户端
      # =========================
      - name: Run Hysteria2 client
        working-directory: scripts
        run: |
          nohup hysteria client -c hysteria_config.json > hysteria.log 2>&1 &
          echo "⏳ Waiting for Hysteria2 to start..."
          sleep 5
          echo "🌐 Proxy test:"
          if curl -x http://127.0.0.1:10808 -I https://www.google.com/generate_204 --max-time 10; then
            echo "✅ Proxy OK"
          else
            echo "❌ Proxy failed"
            cat hysteria.log
            exit 1
          fi

      # =========================
      # 📦 Python依赖
      # =========================
      - name: Install Python Dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      # =========================
      # ▶️ 运行续期脚本
      # =========================
      - name: Run Renew Script
        working-directory: scripts
        env:
          HOST2_RENEW_URL: ${{ secrets.HOST2_RENEW_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROXY: http://127.0.0.1:10808
        run: |
          mkdir -p screenshots
          xvfb-run -a python main.py

      # =========================
      # 📤 上传调试文件
      # =========================
      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug_screenshots
          path: scripts/*.html
          retention-days: 5