name: Auto Renew host2play (HY2)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时执行一次

permissions:
  contents: read

jobs:
  run-renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      # ---------------- 私库拉取 ----------------
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/host2play-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # ---------------- 安装 Python ----------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ---------------- 系统依赖 ----------------
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl wget
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # ---------------- 安装 Hysteria2 ----------------
      - name: Install Hysteria2 client
        run: |
          curl -L -o hysteria https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria
          sudo mv hysteria /usr/local/bin/
          hysteria version

      # ---------------- Python依赖 ----------------
      - name: Install Python dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      # ---------------- 执行续期脚本 ----------------
      - name: Run renew script
        working-directory: scripts
        env:
          HOST2_RENEW_URL: ${{ secrets.HOST2_RENEW_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HY2_URL: ${{ secrets.HY2_URL }}
        run: |
          xvfb-run -a python main.py