name: Auto Renew host2 Server Script (sing-box HY2)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时运行一次

permissions:
  contents: read

jobs:
  run-renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # =========================
      # 📥 拉取私有仓库
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/host2play-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}   
          path: scripts

      # =========================
      # 🐍 Python
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # =========================
      # 📦 系统依赖
      # =========================
      - name: Install System Dependencies
        working-directory: scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl wget

          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # =========================
      # 📡 安装 Sing-box
      # =========================
      - name: Install Sing-box
        working-directory: scripts
        run: |
          curl -L -o sing-box \
            https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-linux-amd64
          chmod +x sing-box
          sudo mv sing-box /usr/local/bin/
          sing-box version

      # =========================
      # 📄 写入 Sing-box 配置
      # =========================
      - name: Write Sing-box HY2 config
        working-directory: scripts
        run: |
          cat > singbox_config.json <<EOF
{
  "log": {
    "level": "warning"
  },
  "inbounds": [
    {
      "type": "http",
      "tag": "local_in",
      "listen": "127.0.0.1",
      "listen_port": 10808
    }
  ],
  "outbounds": [
    {
      "type": "hysteria2",
      "tag": "hy2_out",
      "server": "38.58.180.137",
      "server_port": 3003,
      "password": "0a6568ff-ea3c-4271-9020-450560e10d63",
      "tls": true,
      "sni": "www.bing.com"
    }
  ]
}
EOF

      # =========================
      # 🚀 启动 Sing-box
      # =========================
      - name: Run Sing-box
        working-directory: scripts
        run: |
          nohup sing-box run -c singbox_config.json > singbox.log 2>&1 &
          echo "⏳ Waiting for Sing-box..."
          sleep 5
          echo "🌐 Proxy test:"
          curl -x http://127.0.0.1:10808 -I https://www.google.com/generate_204 || true
          echo "📄 Sing-box log:"
          cat singbox.log

      # =========================
      # 📦 Python依赖
      # =========================
      - name: Install Python Dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      # =========================
      # ▶️ 运行续期脚本
      # =========================
      - name: Run Renew Script
        working-directory: scripts
        env:
          HOST2_RENEW_URL: ${{ secrets.HOST2_RENEW_URL }}         # ✅ Secret: HOST2_RENEW_URL
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}   # ✅ Secret: TELEGRAM_BOT_TOKEN
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}       # ✅ Secret: TELEGRAM_CHAT_ID
          PROXY: http://127.0.0.1:10808
        run: |
          mkdir -p screenshots
          xvfb-run -a python main.py

      # =========================
      # 📤 上传调试文件
      # =========================
      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug_screenshots
          path: scripts/*.html
          retention-days: 5