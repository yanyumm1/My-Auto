name: Auto Renew host2 Server Script (sing-box HY2)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时运行一次

permissions:
  contents: read

jobs:
  run-renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # =========================
      # 📥 拉取私有仓库
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/host2play-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # 🐍 Python
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # =========================
      # 📦 系统依赖
      # =========================
      - name: Install System Dependencies
        working-directory: scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl wget jq

      # =========================
      # 📡 安装 Sing-box
      # =========================
      - name: Install Sing-box
        working-directory: scripts
        run: |
          curl -L -o sing-box \
            https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-linux-amd64
          chmod +x sing-box
          sudo mv sing-box /usr/local/bin/
          sing-box version

      # =========================
      # 📄 生成 singbox_config.json（使用变量）
      # =========================
      - name: Generate singbox_config.json
        working-directory: scripts
        env:
          HY2_SERVER: ${{ secrets.HY2_SERVER }}        # 节点 IP
          HY2_PORT: ${{ secrets.HY2_PORT }}            # 节点端口
          HY2_PASSWORD: ${{ secrets.HY2_PASSWORD }}    # 节点密码
          HY2_SNI: ${{ secrets.HY2_SNI }}              # TLS SNI
        run: |
          cat > singbox_config.json <<EOF
{
  "log": { "level": "warning" },
  "inbounds": [
    {
      "type": "http",
      "tag": "local-in",
      "listen": "127.0.0.1",
      "listen_port": 10808
    }
  ],
  "outbounds": [
    {
      "type": "hysteria2",
      "tag": "hy2-out",
      "server": "${HY2_SERVER}",
      "server_port": ${HY2_PORT},
      "password": "${HY2_PASSWORD}",
      "tls": true,
      "sni": "${HY2_SNI}"
    }
  ]
}
EOF

      # =========================
      # 🚀 启动 Sing-box 并检测代理
      # =========================
      - name: Run Sing-box
        working-directory: scripts
        run: |
          nohup sing-box run -c singbox_config.json > singbox.log 2>&1 &
          echo "⏳ Waiting for Sing-box to start..."
          sleep 5
          echo "🌐 Proxy test:"
          if curl -x http://127.0.0.1:10808 -I https://www.google.com/generate_204 --max-time 10; then
            echo "✅ Proxy OK"
          else
            echo "❌ Proxy failed"
            cat singbox.log
            exit 1
          fi

      # =========================
      # 📦 Python依赖
      # =========================
      - name: Install Python Dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      # =========================
      # ▶️ 运行续费脚本
      # =========================
      - name: Run Renew Script
        working-directory: scripts
        env:
          HOST2_RENEW_URL: ${{ secrets.HOST2_RENEW_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROXY: http://127.0.0.1:10808
        run: |
          mkdir -p screenshots
          xvfb-run -a python main.py

      # =========================
      # 📤 上传调试文件
      # =========================
      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug_screenshots
          path: scripts/*.html
          retention-days: 5