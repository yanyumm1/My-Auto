name: 🟢 SlimeNodes 自动续期

on:
  schedule:
    # 每两天运行一次（UTC 18:00）
    - cron: '0 18 */2 * *'

  workflow_dispatch:

jobs:
  renew:
    name: 🔄 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      # =========================
      # 📥 拉取私库代码
      # =========================
      - name: 📥 拉取私库代码
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/SlimeNodes_Renew_Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      # =========================
      # 🟢 安装 Node.js
      # =========================
      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # =========================
      # 📦 安装依赖
      # =========================
      - name: 📦 安装依赖
        run: npm install

      # =========================
      # 🌐 安装 Playwright
      # =========================
      - name: 🌐 安装 Playwright
        run: npx playwright install chromium --with-deps

      # =========================
      # 🛡️ 启动 GOST
      # =========================
      - name: 🛡️ 启动 GOST
        if: ${{ env.SLIME_GOST_PROXY != '' }}
        env:
          SLIME_GOST_PROXY: ${{ secrets.SLIME_GOST_PROXY }}
        run: |

          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')

          echo "📦 GOST VERSION: $VERSION"

          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"

          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"

          chmod +x gost

          nohup ./gost \
            -L http://:8080 \
            -F "$SLIME_GOST_PROXY" \
            > gost.log 2>&1 &

          sleep 3

          echo "✅ 测试代理"

          MASKED_IP=$(curl -s \
            -x http://127.0.0.1:8080 \
            https://api.ipify.org \
            | sed 's/\([0-9]*\.[0-9]*\)\..*/\1.**.**/g')

          echo "$MASKED_IP"

      # =========================
      # 🚀 执行续期
      # =========================
      - name: 🚀 执行续期
        env:
          SLIME_EMAIL:        ${{ secrets.SLIME_EMAIL }}
          SLIME_PASSWORD:     ${{ secrets.SLIME_PASSWORD }}

          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

          SLIME_GOST_PROXY:   http://127.0.0.1:8080

        run: npx playwright test