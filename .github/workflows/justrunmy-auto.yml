name: JustRunMy-AutoReset

on:
  schedule:
    # UTC 19:12（北京时间 03:12）
    - cron: "12 19 */2 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ✅ 检出私库 justrunmy-auto
      - name: Checkout private repo (justrunmy-auto)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/justrunmy-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 📦 安装系统依赖 + Python 依赖
      - name: Install dependencies
        working-directory: scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install --upgrade pip
          pip install -r requirements.txt -q

      # 🚀 执行 JustRunMy Reset
      - name: Run JustRunMy reset script
        working-directory: scripts
        env:
          JUST_BATCH: ${{ secrets.JUST_BATCH }}
          HEADLESS: "true"
        run: |
          python main.py