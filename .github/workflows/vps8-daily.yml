name: VPS8 Daily (HY2)

on:
  workflow_dispatch:

  schedule:
    - cron: '10 11 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # =========================
      # 📥 主仓库
      # =========================
      - name: Checkout main repo
        uses: actions/checkout@v4

      # =========================
      # 🔐 私库脚本
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/vps8-daily
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # ⏳ 随机延迟
      # =========================
      - name: Random delay
        run: |
          delay=$((RANDOM % 120))
          echo "⏳ 随机延迟: ${delay}s"
          sleep $delay

      # =========================
      # 🐍 Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # 📦 极简系统依赖（避免卡死）
      # =========================
      - name: Install system deps
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            xvfb \
            curl \
            wget \
            unzip \
            fonts-liberation \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libxss1 \
            libasound2t64

      # =========================
      # 🌐 安装 Chrome
      # =========================
      - name: Install Google Chrome
        run: |
          wget -q \
            https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb

          sudo apt-get install -y \
            ./google-chrome-stable_current_amd64.deb

          google-chrome --version

      # =========================
      # 🐍 Python依赖
      # =========================
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip

          pip install \
            seleniumbase \
            requests \
            pysocks

      # =========================
      # 🚀 安装 HY2
      # =========================
      - name: Install Hysteria2
        run: |
          curl -L \
            -o hysteria \
            https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64

          chmod +x hysteria

          sudo mv hysteria /usr/local/bin/

          hysteria version

      # =========================
      # ▶️ 运行脚本
      # =========================
      - name: Run Script
        env:
          VPS8_BATCH: ${{ secrets.VPS8_BATCH }}
          VPS8_HY2_URL: ${{ secrets.VPS8_HY2_URL }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

        run: |
          mkdir -p scripts/screenshots

          xvfb-run -a \
            --server-args="-screen 0 1920x1080x24" \
            python3 scripts/main.py