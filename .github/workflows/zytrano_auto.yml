name: Zytrano Auto Renew

on:
  schedule:
    # 每周六 UTC 19:10（北京时间周日 03:10）
    - cron: '10 19 * * 6'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # =========================
      # 📥 检出私库 zytrano_auto
      # =========================
      - name: Checkout private repo (zytrano_auto)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zytrano_auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # 🐍 Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # =========================
      # 📦 系统依赖
      # =========================
      - name: Install system dependencies
        working-directory: scripts
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            xvfb \
            curl \
            fonts-noto-cjk \
            fonts-dejavu-core \
            python3-tk

      # =========================
      # 📦 Python 依赖
      # =========================
      - name: Install Python packages
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =========================
      # 🚀 执行脚本
      # =========================
      - name: Run Zytrano bot
        working-directory: scripts
        env:
          ZYTRANO_BATCH: ${{ secrets.ZYTRANO_BATCH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python zytrano_auto.py