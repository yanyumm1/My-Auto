name: Weirdhost-AutoRenew

on:
  schedule:
    # 每天 UTC 时间 2:00（北京时间 10:00）
    - cron: '2 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      # ===============================
      # 1️⃣ checkout 当前仓库（用于 time.txt）
      # ===============================
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          path: current

      # ===============================
      # 2️⃣ checkout 私库 
      # ===============================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/weirdhost
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: scripts
        run: pip install -r requirements.txt -q > /dev/null 2>&1

      - name: Run renew script
        working-directory: scripts
        env:
          HEADLESS: 'true'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # ===============================
      # 3️⃣ 更新私库 README
      # ===============================
      - name: Update README with Last Run Time
        if: success()
        working-directory: scripts
        run: |
          LAST_RUN=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          sed -i "1c Last Check-in: $LAST_RUN (Beijing Time)" README.md

      - name: Commit and Push README (private repo)
        if: success()
        working-directory: scripts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update status [skip ci]" && git push || echo "Nothing to push"

      # ===============================
      # 4️⃣ 👉 提交 time.txt 到「当前仓库」
      # ===============================
      - name: Commit time.txt to current repo
        if: success()
        working-directory: current
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          fi

          git add time.txt

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi

      # ===============================
      # 5️⃣ artifacts
      # ===============================
      - name: Upload response JSON files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: response-json
          path: scripts/response_*.json
          retention-days: 7
