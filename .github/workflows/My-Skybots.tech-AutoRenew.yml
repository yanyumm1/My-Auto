name: My-Skybots.tech-AutoRenew

on:
  schedule:
    - cron: '14 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write  

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/skybots-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
         
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 运行 SkyBots 脚本
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python My-Skybots.tech-AutoRenew.py
      
      - name: 提交会话文件
        if: success()
        run: |
          if [ ! -f storage_state.json ]; then
            echo "{}" > storage_state.json
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add storage_state.json
          git diff --staged --quiet || git commit -m "Update storage state session [skip ci]"
          git push || echo "No changes to push"
      
      - name: 上传错误截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: screenshots/
          if-no-files-found: ignore
      
      - name: 失败通知
        if: failure()
        run: |
          echo "SkyBots script failed"
          echo "Time: $(date)"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
