name: Lingxinx Auto Checkin

on:
  schedule:
    - cron: '10 19 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/lingxin_qiandao
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            fonts-noto-cjk \
            fonts-wqy-zenhei \
            fonts-wqy-microhei \
            curl

      - name: Install hysteria
        run: |
          curl -L -o hysteria \
          https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria
          sudo mv hysteria /usr/local/bin/hysteria

      - name: Install pip
        run: |
          pip install seleniumbase pyvirtualdisplay requests

      - name: Run
        working-directory: scripts
        env:
          LINGXIN_BATCH: ${{ secrets.LINGXIN_BATCH }}
          LINGXIN_HY2_URL: ${{ secrets.LINGXIN_HY2_URL }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python lingxinx_checkin.py

      # 👇 上传截图（关键）
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: lingxinx-shots
          path: /tmp/*.png