name: SkyBots Auto Renew

on:
  schedule:
    - cron: "12 18 */2 * *"   # 每3天一次（UTC）
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      # ✅ 拉取私有仓库
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/skybots-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # 🐍 安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 📦 安装系统依赖（适配 Ubuntu 24.04）
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpangocairo-1.0-0 \
            libgtk-3-0

      # 📦 安装 Python 依赖（全部在 yml 里，不用 requirements.txt）
      - name: Install Python dependencies
        working-directory: scripts
        run: |
          pip install --upgrade pip
          pip install camoufox[full] -q

      # 🌐 安装 Playwright 浏览器（Camoufox 需要）
      - name: Install Playwright browsers
        run: |
          playwright install --with-deps

      # 💾 缓存 Camoufox 浏览器，避免每次重复下载
      - name: Cache Camoufox
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ runner.os }}

      # 🚀 预下载 Camoufox（带 GitHub Token 防限流）
      - name: Pre-install Camoufox
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m camoufox fetch

      # 🚀 运行 SkyBots 脚本（带重试，避免网络临时断开失败）
      - name: Run SkyBots Renew Script
        working-directory: scripts
        env:
          ACCOUNT_EMAIL: ${{ secrets.ACCOUNT_EMAIL }}
          ACCOUNT_PASSWORD: ${{ secrets.ACCOUNT_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in {1..3}; do
            python skybots_renew_batch.py && break || echo "⚠️ 重试 $i 次"
          done
