name: Zenix Auto Renew

on:
  schedule:
    - cron: '10 18 * * *'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  zenix:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # =========================
      # 📥 检出私库 zenix-auto
      # =========================
      - name: Checkout private repo (zenix-auto)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zenix-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # 🐍 Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # =========================
      # 📦 Linux deps (Playwright 必需)
      # =========================
      - name: Install system dependencies
        working-directory: scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            fonts-noto-cjk \
            fonts-dejavu-core \
            libnss3 \
            libatk-bridge2.0-0 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libgtk-3-0 \
            libasound2t64 \
            libxshmfence1

      # =========================
      # 📦 Python deps
      # =========================
      - name: Install Python packages
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip

          pip install -q \
            playwright \
            requests

      # =========================
      # 🌐 Install browsers
      # =========================
      - name: Install Playwright Browsers
        working-directory: scripts
        run: |
          python -m playwright install --with-deps chromium

      # =========================
      # 🚀 Run Zenix
      # =========================
      - name: Run Zenix
        working-directory: scripts
        env:
          ZENIX_BATCH: ${{ secrets.ZENIX_BATCH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

        run: |
          python zenix.py